name: EAS Local Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Expo auth check
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ✅ FORCE STABLE GRADLE (fixes your crash)
      - name: Force Gradle 8.7
        run: |
          mkdir -p android/gradle/wrapper

          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip" > android/gradle/wrapper/gradle-wrapper.properties

          echo "Gradle wrapper set to 8.7"

      # (Optional but recommended)
      - name: Clean install
        run: |
          rm -rf node_modules
          npm install

      # 🚀 RUN LOCAL EAS BUILD
      - name: Run EAS Local Build (Android APK)
        run: eas build --platform android --local --profile development --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 🧪 Debug (VERY useful)
      - name: Show build files
        run: ls -lah

      # 📦 Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build-*.apk
            build-*.aab
